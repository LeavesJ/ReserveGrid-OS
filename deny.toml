# cargo-deny configuration for ReserveGrid OS
# cargo-deny 0.19.x schema
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false
# rg-desktop (Tauri) pulls GTK/webkit2gtk system deps that generate
# advisory noise on headless CI. It has its own release-desktop workflow
# with the correct system libraries installed.
exclude = ["rg-desktop"]

[output]
feature-depth = 1

[advisories]
# rustls-pemfile v2.2.0 is unmaintained (RUSTSEC-2025-0134); PEM parsing
# migrated into rustls-pki-types. Suppress until transitive deps update.
#
# proc-macro-error v1.0.4 is unmaintained (RUSTSEC-2024-0370); pulled in
# transitively via include-flate → rust-embed. No replacement available yet.
ignore = ["RUSTSEC-2025-0134", "RUSTSEC-2024-0370"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MITNFA",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

# ring uses a custom license (ISC + MIT + OpenSSL)
[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# encoding_rs is (Apache-2.0 OR MIT) AND BSD-3-Clause
[[licenses.clarify]]
crate = "encoding_rs"
expression = "(Apache-2.0 OR MIT) AND BSD-3-Clause"
license-files = [{ path = "COPYRIGHT", hash = 0x39f8ad31 }]

[licenses.private]
# Ignore workspace crates that are not published to crates.io
ignore = true
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
