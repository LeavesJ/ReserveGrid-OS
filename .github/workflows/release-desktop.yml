name: Release Desktop

# Triggered by pushing a version tag like v1.0.1.
# Builds macOS (universal) and Linux (x86_64) installers,
# then publishes them to a GitHub Release with a Tauri
# auto-update manifest.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v1.0.1)"
        required: true

permissions:
  contents: write  # create/edit releases

env:
  RUST_TOOLCHAIN: "1.92.0"
  NODE_VERSION: "20"
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  # Comma-separated list of base64url-encoded Ed25519 public keys. Verification
  # accepts a license signature if it matches ANY listed pubkey. See ADR-001.
  # Backward compatible: a single pubkey continues to work unchanged.
  # During key rotation, set to "<new_pubkey>,<previous_pubkey>" so existing
  # customer keys keep validating until they expire.
  VELDRA_LICENSE_PUBKEY: ${{ secrets.VELDRA_LICENSE_PUBKEY }}

jobs:
  # Preflight guard: signs a dummy file with TAURI_SIGNING_PRIVATE_KEY then
  # cryptographically verifies the signature against the pubkey embedded in
  # services/rg-desktop/tauri.conf.json. If verify succeeds the keypair is
  # paired by definition. Fails fast if either side rotated without the
  # other. R-164 sibling: signing material parity.
  verify-signing-keys:
    name: Preflight verify Tauri signing keys
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set"
            missing=1
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is not set"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      - name: Decode embedded pubkey
        run: |
          set -euo pipefail
          PUBKEY_B64=$(jq -r '.plugins.updater.pubkey' services/rg-desktop/tauri.conf.json)
          if [ -z "$PUBKEY_B64" ] || [ "$PUBKEY_B64" = "null" ]; then
            echo "::error::tauri.conf.json plugins.updater.pubkey is missing or null"
            exit 1
          fi
          # Tauri stores the minisign pubkey file as one base64 blob.
          # Decoding gives the standard two-line minisign pubkey format.
          echo "$PUBKEY_B64" | base64 -d > /tmp/embedded.pub
          echo "Embedded pubkey:"
          cat /tmp/embedded.pub

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: verify-signing-keys

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Sign dummy file and verify against embedded pubkey
        run: |
          set -euo pipefail
          echo "preflight verify $(date -u +%s)" > /tmp/preflight.txt
          cargo tauri signer sign /tmp/preflight.txt

          # Tauri wraps the entire minisign sig file as one base64 blob.
          # Decoding gives back the standard minisign sig format that
          # `minisign -V` accepts.
          base64 -d /tmp/preflight.txt.sig > /tmp/preflight.minisig

          if minisign -V -p /tmp/embedded.pub -m /tmp/preflight.txt -x /tmp/preflight.minisig; then
            echo "Pubkey match confirmed: signature verifies against embedded public key"
          else
            echo "::error::Tauri signing key mismatch."
            echo "::error::Signature produced by TAURI_SIGNING_PRIVATE_KEY does NOT verify"
            echo "::error::against the pubkey embedded in services/rg-desktop/tauri.conf.json."
            echo "::error::Either rotate the secret to match the embedded pubkey,"
            echo "::error::or revert tauri.conf.json to the pubkey for this private key."
            echo "::error::See docs/runbooks/tauri-updater-key-rotation.md."
            exit 1
          fi

  build:
    needs: verify-signing-keys
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-14
            rust_target: x86_64-apple-darwin
            label: macos-x86_64
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            label: linux-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set"
            missing=1
          fi
          if [ -z "$VELDRA_LICENSE_PUBKEY" ]; then
            echo "::error::VELDRA_LICENSE_PUBKEY secret is not set"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Linux system dependencies required by Tauri / WebKitGTK.
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install frontend dependencies
        working-directory: services/rg-dashboard/frontend
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop app
        working-directory: services/rg-desktop
        run: cargo tauri build --target ${{ matrix.rust_target }}

      # Collect platform-specific artifacts into a known directory.
      - name: Collect artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p dist
          cp target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg dist/ || true
          cp target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz dist/ || true
          cp target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz.sig dist/ || true

      - name: Collect artifacts (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          mkdir -p dist
          cp target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage dist/ || true
          cp target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage.tar.gz dist/ || true
          cp target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage.tar.gz.sig dist/ || true
          cp target/${{ matrix.rust_target }}/release/bundle/deb/*.deb dist/ || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Resolve version tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Generate the Tauri updater manifest (update.json) that the
      # desktop client polls for new versions.
      - name: Generate update manifest
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          # Read signatures from .sig files if they exist.
          MAC_ARM_SIG=""
          MAC_X86_SIG=""
          LINUX_SIG=""
          for f in artifacts/*.app.tar.gz.sig; do
            if echo "$f" | grep -q "aarch64\|arm64"; then
              MAC_ARM_SIG=$(cat "$f" 2>/dev/null || echo "")
            else
              MAC_X86_SIG=$(cat "$f" 2>/dev/null || echo "")
            fi
          done
          for f in artifacts/*.AppImage.tar.gz.sig; do
            LINUX_SIG=$(cat "$f" 2>/dev/null || echo "")
          done

          # Find actual filenames.
          MAC_ARM_TAR=$(cd artifacts && ls *aarch64*app.tar.gz 2>/dev/null | head -1 || echo "")
          MAC_X86_TAR=$(cd artifacts && ls *x86_64*app.tar.gz 2>/dev/null | head -1 || echo "")
          LINUX_TAR=$(cd artifacts && ls *.AppImage.tar.gz 2>/dev/null | head -1 || echo "")

          cat > artifacts/update.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "ReserveGrid OS ${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "${BASE_URL}/${MAC_ARM_TAR}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X86_SIG}",
                "url": "${BASE_URL}/${MAC_X86_TAR}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/${LINUX_TAR}"
              }
            }
          }
          MANIFEST

      # Detect prerelease tags so release-candidate / beta / alpha builds are
      # not promoted to "latest" on the GitHub Releases page.
      # v2.0.0-rc1 → true, v1.1.0 → false.
      - name: Detect prerelease
        id: prerelease
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          if echo "$VERSION" | grep -Eq -- '-(rc|beta|alpha)[0-9]*$'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Prefer the version-specific release notes file. Naming convention:
      #   v1.1.0       → RELEASE_NOTES_V1.1.md
      #   v1.0.2       → RELEASE_NOTES_V1.0.2.md
      #   v2.0.0-rc1   → RELEASE_NOTES_V2.0.0-rc1.md
      # Trailing `.0` is stripped only on plain semver tags. Pre-release
      # suffixes (`-rc1` etc.) are preserved verbatim and case-sensitive.
      # Fall back to the generic download table when no file exists.
      - name: Resolve release body
        id: body
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NOTES_SUFFIX=$(echo "$VERSION" | sed 's/^v/V/')
          # Only strip a trailing `.0` when there's no pre-release suffix.
          if ! echo "$NOTES_SUFFIX" | grep -q -- '-'; then
            NOTES_SUFFIX=$(echo "$NOTES_SUFFIX" | sed 's/\.0$//')
          fi
          NOTES_FILE="RELEASE_NOTES_${NOTES_SUFFIX}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "source=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (with notes)
        if: steps.body.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "ReserveGrid OS ${{ steps.tag.outputs.version }}"
          body_path: ${{ steps.body.outputs.source }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: artifacts/*
          fail_on_unmatched_files: false

      - name: Create GitHub Release (fallback)
        if: steps.body.outputs.found == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "ReserveGrid OS ${{ steps.tag.outputs.version }}"
          body: |
            ## ReserveGrid OS ${{ steps.tag.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Linux (x86_64) | `.AppImage` / `.deb` |

            ### Auto-update
            Existing installations will update automatically via the built-in updater.
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: artifacts/*
          fail_on_unmatched_files: false
