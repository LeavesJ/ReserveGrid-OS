# Production policy configuration.
#
# All enforcement flags are enabled. Templates that violate policy are
# rejected with a machine-readable reason_code.
#
# Key differences from config/policy.toml (dev):
#   - reject_empty_templates = true
#   - reject_coinbase_zero = true
#   - enforce_weight_ratio = true
#   - enforce_template_age = true (5s stale threshold)

[policy]
protocol_version = 2
required_prevhash_len = 64
min_total_fees = 1000
max_tx_count = 4294967295

low_mempool_tx = 0
high_mempool_tx = 0
min_avg_fee_lo = 0
min_avg_fee_mid = 0
min_avg_fee_hi = 0

reject_empty_templates = true
reject_coinbase_zero = true
unknown_mempool_as_high = true

[policy.safety]
max_weight_ratio = 0.999
enforce_weight_ratio = true
max_template_age_ms = 5000
enforce_template_age = true
warn_sigops_ratio = 0.95
warn_coinbase_sigops_max = 400

# ── ADR-003 Phase 2 Class M (mempool ground truth) ──
# Production defaults validated by the Setup A shadow soak (25-day
# cumulative window, 103,389 Class M checks, zero false positives at
# tolerance_pct = 4.0). Before the Setup B/C launch-gate soak per
# docs/runbooks/phase2-shadow-soak.md, point rpc_url at your own
# mainnet bitcoind (not regtest) and set credentials. rpc_pass is read
# from VELDRA_BITCOIND_RPC_PASS when set, falling back to the value
# here, so keep the secret in the environment and leave it empty here.
[policy.mempool]
enforce = true
tolerance_pct = 4.0
poll_interval_secs = 10
max_stale_secs = 60
per_tx_detail = false
rpc_url = "TODO_SET_MAINNET_BITCOIND_RPC_URL"
rpc_user = "TODO_SET_BITCOIND_RPC_USER"
rpc_pass = ""
